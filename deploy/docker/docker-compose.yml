services:
  mysql:
    image: ${KB_MYSQL_IMAGE:-mysql:8.0}
    container_name: ${KB_MYSQL_CONTAINER:-kb-mysql}
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: ${KB_DB_NAME:-kb}
      MYSQL_USER: ${KB_DB_USER:-kb_user}
      MYSQL_PASSWORD: ${KB_DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${KB_DB_ROOT_PASSWORD:-root_change_me}
      TZ: ${KB_TIMEZONE:-Asia/Shanghai}
    ports:
      - '${KB_DB_PORT_HOST:-13306}:3306'
    volumes:
      - ../../data/mysql:/var/lib/mysql
      - ../../scripts/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${KB_DB_ROOT_PASSWORD:-root_change_me} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - kb-net

  redis:
    image: ${KB_REDIS_IMAGE:-redis:7.2}
    container_name: ${KB_REDIS_CONTAINER:-kb-redis}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${KB_REDIS_PASSWORD:-change_me}"]
    ports:
      - '${KB_REDIS_PORT_HOST:-6379}:6379'
    volumes:
      - ../../data/redis:/data
    networks:
      - kb-net

  minio:
    image: ${KB_MINIO_IMAGE:-minio/minio:latest}
    container_name: ${KB_MINIO_CONTAINER:-kb-minio}
    environment:
      MINIO_ROOT_USER: ${KB_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${KB_MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ':9001'
    ports:
      - '${KB_MINIO_API_PORT_HOST:-9000}:9000'
      - '${KB_MINIO_CONSOLE_PORT_HOST:-9001}:9001'
    volumes:
      - ../../data/minio:/data
    networks:
      - kb-net

  elasticsearch:
    image: ${KB_ES_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:7.17.24}
    container_name: ${KB_ES_CONTAINER:-kb-elasticsearch}
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: '${KB_ES_JAVA_OPTS:--Xms1g -Xmx1g}'
      xpack.security.enabled: 'false'
      TZ: ${KB_TIMEZONE:-Asia/Shanghai}
    ports:
      - '${KB_ES_PORT_HOST:-9200}:9200'
    volumes:
      - ../../data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - kb-net

  qdrant:
    image: ${KB_QDRANT_IMAGE:-qdrant/qdrant:v1.13.4}
    container_name: ${KB_QDRANT_CONTAINER:-kb-qdrant}
    ports:
      - '${KB_QDRANT_HTTP_PORT_HOST:-6333}:6333'
      - '${KB_QDRANT_GRPC_PORT_HOST:-6334}:6334'
    volumes:
      - ../../data/qdrant:/qdrant/storage
    networks:
      - kb-net

  rag-hub-backend:
    image: ${KB_BACKEND_BASE_IMAGE:-eclipse-temurin:17-jre}
    container_name: ${KB_BACKEND_CONTAINER:-rag-hub-backend}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      elasticsearch:
        condition: service_started
      qdrant:
        condition: service_started
    working_dir: /app
    command: ["java", "-jar", "/app/app.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KB_DB_HOST: mysql
      KB_DB_PORT: 3306
      KB_DB_NAME: ${KB_DB_NAME:-kb}
      KB_DB_USER: ${KB_DB_USER:-kb_user}
      KB_DB_PASSWORD: ${KB_DB_PASSWORD:-change_me}
      KB_REDIS_HOST: redis
      KB_REDIS_PORT: 6379
      KB_REDIS_PASSWORD: ${KB_REDIS_PASSWORD:-change_me}
      KB_ES_URIS: http://elasticsearch:9200
      KB_ES_INDEX: ${KB_ES_INDEX:-kb_chunk}
      KB_QDRANT_HOST: qdrant
      KB_QDRANT_PORT: 6333
      KB_QDRANT_COLLECTION: ${KB_QDRANT_COLLECTION:-kb_chunk}
      KB_MINIO_ENDPOINT: http://minio:9000
      KB_MINIO_ACCESS_KEY: ${KB_MINIO_ACCESS_KEY:-minioadmin}
      KB_MINIO_SECRET_KEY: ${KB_MINIO_SECRET_KEY:-minioadmin123}
      KB_LLM_ENABLED: "${KB_LLM_ENABLED:-false}"
      KB_LLM_FAIL_OPEN: "${KB_LLM_FAIL_OPEN:-true}"
    ports:
      - '${KB_BACKEND_PORT_HOST:-8080}:8080'
    volumes:
      - ../../backend/target/rag-hub-backend-0.0.1-SNAPSHOT.jar:/app/app.jar
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep \"200\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - kb-net

  rag-hub-parser-worker:
    build:
      context: ../../parser-worker
      dockerfile: Dockerfile
    container_name: ${KB_WORKER_CONTAINER:-rag-hub-parser-worker}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_started
      qdrant:
        condition: service_started
    working_dir: /app
    environment:
      KB_DB_HOST: mysql
      KB_DB_PORT: 3306
      KB_DB_NAME: ${KB_DB_NAME:-kb}
      KB_DB_USER: ${KB_DB_USER:-kb_user}
      KB_DB_PASSWORD: ${KB_DB_PASSWORD:-change_me}
      KB_ES_ENABLED: "${KB_ES_ENABLED:-true}"
      KB_ES_ENDPOINT: http://elasticsearch:9200
      KB_ES_INDEX: ${KB_ES_INDEX:-kb_chunk}
      KB_VECTOR_ENABLED: "${KB_VECTOR_ENABLED:-true}"
      KB_QDRANT_ENDPOINT: http://qdrant:6333
      KB_QDRANT_COLLECTION: ${KB_QDRANT_COLLECTION:-kb_chunk}
      KB_EMBEDDING_MODEL: ${KB_EMBEDDING_MODEL:-mock-embedding-v1}
      KB_EMBEDDING_DIM: ${KB_EMBEDDING_DIM:-1024}
    volumes:
      - ../../parser-worker/mock-storage:/app/mock-storage
      - ../../parser-worker/tmp:/app/tmp
    networks:
      - kb-net
    restart: unless-stopped

  nginx:
    image: ${KB_NGINX_IMAGE:-nginx:1.27}
    container_name: ${KB_NGINX_CONTAINER:-kb-nginx}
    depends_on:
      rag-hub-backend:
        condition: service_healthy
    ports:
      - '${KB_NGINX_PORT_HOST:-80}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kb-net

networks:
  kb-net:
    driver: bridge
