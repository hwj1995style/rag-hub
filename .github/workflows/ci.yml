name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

  parser-worker-test:
    name: Parser Worker Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parser-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: parser-worker/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  script-sanity:
    name: Script Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure key scripts exist
        shell: pwsh
        run: |
          $paths = @(
            "scripts/init_backend_env.ps1",
            "scripts/test_backend.ps1",
            "scripts/package_backend.ps1",
            "scripts/test_parser_worker.ps1",
            "scripts/package_parser_worker.ps1",
            "scripts/reindex_sample_data.ps1",
            "scripts/api_smoke_test.ps1",
            "scripts/api_assert_test.ps1",
            "deploy/linux/verify_deployment.sh"
          )

          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing script: $path"
            }
          }
